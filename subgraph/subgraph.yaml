specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VectorHook
    network: base-sepolia
    source:
      address: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
      abi: VectorHook
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - SwapEvaluation
        - SwapExecution
      abis:
        - name: VectorHook
          file: ./abis/VectorHook.json
      eventHandlers:
        - event: HookSwapEvaluated(indexed bytes32,indexed address,uint8,uint256)
          handler: handleSwapEvaluated
        - event: SwapExecuted(indexed bytes32,indexed address,int128,int128)
          handler: handleSwapExecuted
        - event: SwapBlockedByPolicy(bytes32,uint256,string)
          handler: handleSwapBlocked
      file: ./src/vector-hook.ts
  - kind: ethereum
    name: PolicyEngine
    network: base-sepolia
    source:
      address: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      abi: PolicyEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - SwapEvaluation
        - ProtocolStats
      abis:
        - name: PolicyEngine
          file: ./abis/PolicyEngine.json
      eventHandlers:
        - event: SwapEvaluated(indexed bytes32,indexed address,uint8,uint256)
          handler: handlePolicySwapEvaluated
        - event: SwapBlocked(indexed bytes32,indexed address,uint256,string)
          handler: handlePolicySwapBlocked
        - event: SwapWarned(indexed bytes32,indexed address,uint256,string)
          handler: handlePolicySwapWarned
      file: ./src/policy-engine.ts
  - kind: ethereum
    name: VectorRiskRegistry
    network: base-sepolia
    source:
            address: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      abi: VectorRiskRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - PolicyChange
      abis:
        - name: VectorRiskRegistry
          file: ./abis/VectorRiskRegistry.json
      eventHandlers:
        - event: PoolProtectionSet(indexed bytes32,uint8,uint256,uint256)
          handler: handlePoolProtectionSet
        - event: PoolProtectionRemoved(indexed bytes32)
          handler: handlePoolProtectionRemoved
        - event: SignerUpdated(indexed address,indexed address)
          handler: handleSignerUpdated
      file: ./src/risk-registry.ts
  - kind: ethereum
    name: VectorReactiveCallback
    network: base-sepolia
    source:
      address: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
      abi: VectorReactiveCallback
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CrossChainAlert
        - ProtocolStats
      abis:
        - name: VectorReactiveCallback
          file: ./abis/VectorReactiveCallback.json
      eventHandlers:
        - event: CrossChainRiskAlert(indexed uint256,indexed bytes32,indexed address,uint256,string)
          handler: handleCrossChainAlert
      file: ./src/reactive-callback.ts
